name: AzCertify Pre-flight Validation

on:
  workflow_call:
    inputs:
      image_definition:
        description: 'SIG image definition name'
        required: true
        type: string
      image_version:
        description: 'Image version (e.g. 2026.03.18)'
        required: true
        type: string
      os_family:
        description: 'linux or windows'
        required: true
        type: string
      gallery_name:
        required: false
        type: string
        default: 'acgpackerfactoryeastus'
      gallery_rg:
        required: false
        type: string
        default: 'RG-PACKER-IMAGE-FACTORY-EASTUS'

permissions:
  id-token: write
  contents: read

jobs:
  azcertify:
    name: AzCertify (${{ inputs.image_definition }})
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure Credentials
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Resolve SIG Image Resource ID
        id: img
        shell: pwsh
        run: |
          $sub = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          $rg  = "${{ inputs.gallery_rg }}"
          $gal = "${{ inputs.gallery_name }}"
          $def = "${{ inputs.image_definition }}"
          $ver = "${{ inputs.image_version }}"
          $rid = "/subscriptions/$sub/resourceGroups/$rg/providers/Microsoft.Compute/galleries/$gal/images/$def/versions/$ver"
          "resource_id=$rid" >> $env:GITHUB_OUTPUT
          Write-Host "Image Resource ID: $rid"

      - name: Run AzCertify Pre-flight (Persistent VM)
        shell: pwsh
        env:
          CERTTEST_VM_PASSWORD: ${{ secrets.CERTTEST_VM_PASSWORD }}
        run: |
          .\scripts\run-azcertify.ps1 `
            -ImageResourceId "${{ steps.img.outputs.resource_id }}" `
            -OSFamily        "${{ inputs.os_family }}"

      - name: Upload AzCertify Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azcertify-report-${{ inputs.image_definition }}-${{ inputs.image_version }}
          path: |
            azcertify-report.xml
            azcertify-summary.md
          retention-days: 30
