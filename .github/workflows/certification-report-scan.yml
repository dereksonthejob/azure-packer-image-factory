      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cert-full-scan-${{ github.run_number }}
          path: certification_full_scan.json
          retention-days: 30

      - name: Write Job Summary
        if: always()
        run: python3 .github/scripts/marketplace/cert_summary.py >> $GITHUB_STEP_SUMMARY
