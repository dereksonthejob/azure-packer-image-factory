name: Certification Report Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1,4'

jobs:
  scan-certification-reports:
    name: Scan All Offers for CVE Failures
    runs-on: [self-hosted]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install requests msal --quiet --break-system-packages 2>/dev/null || python3 -m pip install requests msal --quiet

      - name: Run Full Certification History Scanner
        id: cert_scan
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          # All VM/Container product GUIDs (from GET /product API, auto-discovered 2026-03-16)
          # Remove this once SP has 'Developer' role in Partner Center (then API lists them dynamically)
